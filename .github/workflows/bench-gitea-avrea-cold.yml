name: bench-gitea-avrea-cold
on:
  workflow_dispatch:
jobs:
  docker:
    runs-on: avrea-ubuntu-latest-4-vcpu
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Build image (no cache)
        env:
          DOCKER_BUILDKIT: 1
        run: docker build -t bench-gitea .
